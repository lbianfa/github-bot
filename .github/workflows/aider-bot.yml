name: Aider AI Agent

on:
  issue_comment:
    types: [created]

jobs:
  run-aider:
    # Solo ejecutamos si el comentario empieza con /aider y el usuario tiene permisos (OWNER, COLLABORATOR o MEMBER)
    if: >-
      startsWith(github.event.comment.body, '/aider') &&
      (github.event.comment.author_association == 'OWNER' || 
       github.event.comment.author_association == 'COLLABORATOR' || 
       github.event.comment.author_association == 'MEMBER')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aider-chat

      - name: Configure Git
        run: |
          git config --global user.name "Fabian Serna"
          git config --global user.email "fabianserna2013@gmail.com"

      - name: Create or checkout branch
        run: |
          # Determinar ID del issue o PR
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          BRANCH_NAME="aider/issue-$ISSUE_NUMBER"
          
          # Intentar hacer checkout si la rama ya existe, si no, crearla desde main
          git fetch origin
          if git ls-remote --exit-code --heads origin "$BRANCH_NAME"; then
            git checkout "$BRANCH_NAME"
          else
            git checkout -b "$BRANCH_NAME"
          fi

      - name: Run Aider
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AIDER_MODEL: ${{ secrets.AIDER_MODEL }}
        run: |
          COMMENT="${{ github.event.comment.body }}"
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          ISSUE_FILE="issue_${ISSUE_NUMBER}.md"
          
          # Determinar modelo desde secrets o usar default
          MODEL_NAME="${AIDER_MODEL:-gemini/gemini-flash-latest}"
          
          echo "Modelo seleccionado: $MODEL_NAME"
          echo "Descargando detalles del issue..."
          gh issue view "$ISSUE_NUMBER" > "$ISSUE_FILE"
          
          echo "Ejecutando aider basado en el comentario: $COMMENT"
          
          # Se ejecuta aider con Gemini o Claude. Se le pasa el archivo del issue generado y restricciones específicas.
          aider --model "$MODEL_NAME" \
            --read "$ISSUE_FILE" \
            --message "You are an Expert Software Architect operating as an autonomous agent within a CI/CD pipeline (GitHub Actions). You are an unattended system: there is no human in the loop to answer questions, confirm changes, or create files.

          CONTEXT INPUTS:
          - Main requirement specification: $ISSUE_FILE
          - Additional instructions or constraints: '$COMMENT'

          STRICT EXECUTION RULES:
          1. Closed Scope: Implement solely and exclusively what is requested in the inputs. It is strictly forbidden to invent functionalities, engage in \"gold-plating\", or modify code outside the scope of the issue, such as modifying markdown files.
          2. Comprehensive Solution: Do not stop until the code is 100% complete. Do not use \"placeholders\" or comments like \"TODO: implement logic here\".
          3. File Management: If the requirement calls for creating new files (e.g., to respect separation of concerns or project patterns), write them directly with their full paths and content so the system generates them.
          4. Action Limit (No Commits): Your only responsibility is to write and modify source code in the file system. DO NOT execute, nor suggest, version control commands (such as \`git commit\` or \`git push\`), as the CI/CD pipeline will handle that afterwards.

          Proceed immediately with the implementation and finish execution silently upon completion." \
            --commit-prompt "Generate an english commit message. Always prefix the message with 'Fixes #$ISSUE_NUMBER -'. Be concise." \
            --yes-always --auto-commits
          
          # Verificar si Aider generó nuevos commits revisando contra master u origin
          # Dado que hicimos un checkout a una rama nueva o existente, verificamos el listado de diff
          if git fetch origin main && git log origin/main..HEAD --oneline | grep -q .; then
            echo "Se encontraron nuevos commits generados por Aider. Realizando Push..."
            git push -u origin HEAD
          else
            echo "Error: Aider no generó ningún commit ni código nuevo basado en el Issue."
            exit 1
          fi
