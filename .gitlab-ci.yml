image: python:3.11

variables:
  # Estas variables deben definirse en: Settings > CI/CD > Variables de GitLab
  # GEMINI_API_KEY: $GEMINI_API_KEY
  # ANTHROPIC_API_KEY: $ANTHROPIC_API_KEY
  # AIDER_MODEL: $AIDER_MODEL
  # GITLAB_TOKEN: $GITLAB_TOKEN # Token de acceso (Project Access Token) con permisos: api, read_repository, write_repository

stages:
  - run-ai

run-aider:
  stage: run-ai
  rules:
    # En GitLab, los comentarios en issues no disparan pipelines por defecto.
    # El pipeline puede ejecutarse si lo lanzamos por API (Trigger) o vía Web con variables.
    - if: $CI_PIPELINE_SOURCE == "trigger"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "api"

  before_script:
    - python -m pip install --upgrade pip
    - pip install aider-chat requests
    
    # Configurar Git
    - git config --global user.name "Aider Bot"
    - git config --global user.email "bot@gitlab.com"
    # Configurar credenciales para que git push funcione automáticamente
    - git config --global credential.helper store
    - echo "https://oauth2:${GITLAB_TOKEN}@${CI_SERVER_HOST}" > ~/.git-credentials

  script:
    # En caso de ejecutarse vía webhook, esperamos que las variables con IID del issue y el comentario se pasen.
    - export ISSUE_NUMBER="${ISSUE_IID:-$CI_ISSUE_IID}"
    - export COMMENT="${ISSUE_COMMENT:-$CI_COMMIT_MESSAGE}"
    
    - |
      if [ -z "$ISSUE_NUMBER" ]; then
        echo "Error: ISSUE_NUMBER o ISSUE_IID no está definido."
        exit 1
      fi

    # Chequeo preventivo de seguridad
    - |
      if [[ ! "$COMMENT" == /aider* ]]; then
        echo "El comentario no inicia con /aider. Deteniendo la ejecución sin error."
        exit 0
      fi

    - BRANCH_NAME="aider/issue-$ISSUE_NUMBER"
    
    # Intentar hacer checkout si la rama ya existe, si no, crearla desde la rama principal
    # Se obtienen las ramas para evitar error de refs faltantes
    - git fetch origin
    - |
      if git ls-remote --exit-code --heads origin "$BRANCH_NAME"; then
        git checkout "$BRANCH_NAME"
      else
        git checkout -b "$BRANCH_NAME" $CI_DEFAULT_BRANCH
      fi

    # Determinar modelo desde secrets o usar default
    - MODEL_NAME="${AIDER_MODEL:-gemini/gemini-flash-latest}"
    - echo "Modelo seleccionado: $MODEL_NAME"
    
    - export ISSUE_FILE="issue_${ISSUE_NUMBER}.md"
    - echo "Descargando detalles del issue desde GitLab API..."
    
    # Python script para obtener e imprimir el Issue a un md nativamente (reemplaza 'gh issue view')
    - |
      python3 -c "
      import os, requests
      api = os.environ['CI_API_V4_URL']
      pid = os.environ['CI_PROJECT_ID']
      iid = os.environ['ISSUE_NUMBER']
      tk = os.environ.get('GITLAB_TOKEN', '')
      url = f'{api}/projects/{pid}/issues/{iid}'
      r = requests.get(url, headers={'PRIVATE-TOKEN': tk})
      if r.status_code == 200:
          data = r.json()
          with open(os.environ['ISSUE_FILE'], 'w', encoding='utf-8') as f:
              f.write(f\"# {data.get('title', '')}\n\n{data.get('description', '')}\")
      else:
          print(f'Error fetching issue: {r.status_code}', r.text)
          exit(1)
      "

    - echo "Ejecutando aider basado en el comentario '$COMMENT'..."
    
    # Se ejecuta aider con las restricciones y el contexto definido
    - |
      aider --model "$MODEL_NAME" \
        --read "$ISSUE_FILE" \
        --message "You are an Expert Software Architect operating as an autonomous agent within a CI/CD pipeline (GitLab CI). You are an unattended system: there is no human in the loop to answer questions, confirm changes, or create files.

      CONTEXT INPUTS:
      - Main requirement specification: $ISSUE_FILE
      - Additional instructions or constraints: '$COMMENT'

      STRICT EXECUTION RULES:
      1. Closed Scope: Implement solely and exclusively what is requested in the inputs. It is strictly forbidden to invent functionalities, engage in \"gold-plating\", or modify code outside the scope of the issue, such as modifying markdown files.
      2. Comprehensive Solution: Do not stop until the code is 100% complete. Do not use \"placeholders\" or comments like \"TODO: implement logic here\".
      3. File Management: If the requirement calls for creating new files (e.g., to respect separation of concerns or project patterns), write them directly with their full paths and content so the system generates them.
      4. Action Limit (No Commits): Your ONLY responsibility is to provide the raw code changes to the files. Under no circumstances should you generate git commits, output commit hashes, or execute/suggest version control commands. Aider will automatically commit all your file changes via the \`--auto-commits\` flag.

      Proceed immediately with the implementation and finish execution silently upon completion." \
        --commit-prompt "Generate a conventional commit message. The first line must be a concise title starting with 'Fixes #$ISSUE_NUMBER - '. Put all additional context and detailed explanation in the commit body (separated by a blank line)." \
        --yes-always --auto-commits
      
    # Verificar si Aider generó nuevos commits revisando contra la rama default (ej. main/master)
    - git fetch origin $CI_DEFAULT_BRANCH
    - |
      if git log origin/$CI_DEFAULT_BRANCH..HEAD --oneline | grep -q .; then
        echo "Se encontraron nuevos commits generados por Aider. Realizando Push..."
        git push -u origin HEAD
      else
        echo "Error: Aider no generó ningún commit ni código nuevo basado en el Issue."
        exit 1
      fi
